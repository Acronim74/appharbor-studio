<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppHarbor Studio — Coming Soon</title>
  <meta name="description" content="AppHarbor Studio is being updated. Coming soon in English.">
  <meta property="og:title" content="AppHarbor Studio">
  <meta property="og:description" content="Coming soon in English.">
  <meta property="og:url" content="https://appharbor.studio">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:      #0F1117;
      --color-surface: #1A1D27;
      --color-accent:  #4A9EFF;
      --color-accent-2:#00D4AA;
      --color-text:    #E8EAF0;
      --color-muted:   #8B90A0;
      --font-heading:  'Syne', sans-serif;
      --font-body:     'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
    }

    .logo {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      margin-bottom: 3rem;
      color: var(--color-text);
    }

    .logo span {
      color: var(--color-accent);
    }

    .badge {
      display: inline-block;
      background: rgba(74, 158, 255, 0.12);
      border: 1px solid rgba(74, 158, 255, 0.25);
      color: var(--color-accent);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 1.25rem;
    }

    .gradient {
      background: linear-gradient(135deg, var(--color-accent), var(--color-accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: var(--color-muted);
      font-size: 1.05rem;
      line-height: 1.65;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 3rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-accent);
      opacity: 0.3;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">App<span>Harbor</span> Studio</div>
    <h1 class="gradient">Coming Soon</h1>
    <p>We're working on something. Check back later.</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
